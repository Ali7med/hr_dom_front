<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حضوري — لوحة التحكم</title>
    <script>
      // طبّق المظهر واللغة قبل الرسم لتفادي الوميض (FOUC).
      (function () {
        try {
          var theme = localStorage.getItem('hr_dom_theme')
          if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          }
          if (theme === 'dark') document.documentElement.classList.add('dark')

          var locale = localStorage.getItem('hr_dom_locale') === 'en' ? 'en' : 'ar'
          document.documentElement.lang = locale
          document.documentElement.dir = locale === 'ar' ? 'rtl' : 'ltr'
        } catch (e) {
          /* localStorage غير متاح — تجاهل */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
